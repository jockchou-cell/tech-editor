<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>科技主编爆款生成器</title>
<style>
body { background:black; color:white; font-family:Arial; padding:40px; }
textarea { width:100%; height:200px; }
button { padding:10px 20px; margin-top:10px; }
pre { white-space:pre-wrap; margin-top:20px; }
</style>
</head>
<body>

<h1>科技主编爆款生成器</h1>

<textarea id="input" placeholder="粘贴新闻或文章"></textarea>
<br>
<button onclick="generate()">生成文章</button>

<pre id="output"></pre>

<script>
async function generate() {
  const content = document.getElementById("input").value;
  const response = await fetch("http://127.0.0.1:5000/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({content})
  });

  const data = await response.json();
  document.getElementById("output").innerText = data.result;
}
</script>

</body>
</html>
